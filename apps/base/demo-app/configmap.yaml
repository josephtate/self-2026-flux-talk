---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-html
  namespace: ${NAMESPACE_PREFIX}-demo-app
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><meta charset="utf-8"><title>FluxCD Demo</title>
    <style>
      body { font-family: sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1rem; }
      h1 { color: #326CE5; }
      .version { font-size: 1.5rem; font-weight: bold; margin: 2rem 0; }
    </style>
    </head>
    <body>
      <h1>GitOps with FluxCD</h1>
      <p class="version">v1</p>
      <p>Edit <code>apps/base/demo-app/configmap.yaml</code>, commit, push — Flux does the rest.</p>
    </body>
    </html>
