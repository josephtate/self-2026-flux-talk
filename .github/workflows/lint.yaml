---
name: Lint and Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          # yamlfmt
          wget -qO /usr/local/bin/yamlfmt \
            "https://github.com/google/yamlfmt/releases/latest/download/yamlfmt_linux_amd64"
          chmod +x /usr/local/bin/yamlfmt

          # shellcheck
          sudo apt-get install -y shellcheck

          # kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" \
            | bash
          sudo mv kustomize /usr/local/bin/

          # flux CLI
          curl -s https://fluxcd.io/install.sh | sudo bash

      - name: YAML lint
        run: yamlfmt -lint -conf .yamlfmt.yaml .

      - name: Shell lint
        run: |
          find manual/scripts -name "*.sh" -exec shellcheck --severity=warning {} \;

      - name: Kustomize build (all overlays)
        run: |
          for path in clusters/dev infrastructure apps/dev; do
            echo "--- kustomize build $path ---"
            kustomize build "$path" > /dev/null
          done

      - name: Flux manifest validation
        run: |
          flux build kustomization flux-system \
            --path ./clusters/dev \
            --kustomization-file ./clusters/dev/flux-system/kustomization.yaml \
            --dry-run
