---
name: Lint and Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          pip install yamllint

          sudo apt-get update
          sudo apt-get install -y shellcheck

          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: YAML lint
        run: yamllint .

      - name: Shell lint
        run: |
          find manual/scripts -name "*.sh" -type f -exec shellcheck --severity=warning {} +

      - name: Kustomize build
        run: |
          for path in clusters/dev/flux-system infrastructure apps; do
            echo "--- kustomize build $path ---"
            kustomize build "$path" > /dev/null
          done

      - name: Check formatting
        run: |
          if grep -r '[[:space:]]$' --include="*.yaml" --include="*.sh" --include="*.md" .; then
            echo "Found trailing whitespace"
            exit 1
          fi
          for file in $(find . -name "*.yaml" -o -name "*.sh" -o -name "*.md" | grep -v ".git"); do
            if [ "$(tail -c1 "$file" | wc -l)" -eq 0 ]; then
              echo "Missing final newline: $file"
              exit 1
            fi
          done
