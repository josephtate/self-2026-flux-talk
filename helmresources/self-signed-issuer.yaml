---
# ClusterIssuer using a self-signed CA — for demo purposes only.
# In the real platform, this is a Vault PKI issuer.
# This resource requires cert-manager CRDs, which is why it lives in
# helmresources/ (dependsOn: infrastructure) rather than infrastructure/.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer-${NAMESPACE_PREFIX}
spec:
  selfSigned: {}
