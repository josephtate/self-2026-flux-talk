---
# Resources that depend on Helm-installed CRDs.
# This Kustomization is separate from infrastructure/ because:
#   - infrastructure/ installs Helm charts (which register CRDs asynchronously)
#   - These resources USE those CRDs (e.g. ClusterIssuer uses cert-manager CRDs)
#   - Flux's dependsOn + wait:true in the infrastructure Kustomization ensures
#     CRDs are registered before this Kustomization runs
#
# If you put a ClusterIssuer in the same Kustomization as the cert-manager
# HelmRelease, you get: "no matches for kind ClusterIssuer in cert-manager.io/v1"
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - self-signed-issuer.yaml
