---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: self-2026-flux-talk
  namespace: flux-system
spec:
  interval: 30s
  ref:
    branch: ${GITHUB_BRANCH}  # Set by bootstrap script based on current git branch
  secretRef:
    name: flux-system
  timeout: 60s
  url: https://github.com/${GITHUB_OWNER}/${GITHUB_REPO}.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./clusters/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: self-2026-flux-talk
  postBuild:
    substitute:
      ENVIRONMENT: "dev"
      NAMESPACE_PREFIX: "dev"
      CLUSTER_NAME: "dev-cluster"
---
# infrastructure Kustomization: installs Helm chart operators.
# wait: true ensures CRDs are registered before helmresources tries to use them.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 5m
  path: ./infrastructure
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: self-2026-flux-talk
  postBuild:
    substitute:
      ENVIRONMENT: "dev"
      NAMESPACE_PREFIX: "dev"
      CLUSTER_NAME: "dev-cluster"
      DOMAIN: "dev-cluster.lan"
---
# helmresources Kustomization: first resources that USE Helm-installed CRDs.
# dependsOn infrastructure so CRDs exist before this runs.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: helmresources
  namespace: flux-system
spec:
  interval: 5m
  path: ./helmresources
  prune: true
  sourceRef:
    kind: GitRepository
    name: self-2026-flux-talk
  postBuild:
    substitute:
      ENVIRONMENT: "dev"
      NAMESPACE_PREFIX: "dev"
      CLUSTER_NAME: "dev-cluster"
      DOMAIN: "dev-cluster.lan"
  dependsOn:
    - name: infrastructure
---
# apps Kustomization: application deployments.
# Depends on both infrastructure (operators) and helmresources (ClusterIssuer).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: self-2026-flux-talk
  postBuild:
    substitute:
      ENVIRONMENT: "dev"
      NAMESPACE_PREFIX: "dev"
      CLUSTER_NAME: "dev-cluster"
      DOMAIN: "dev-cluster.lan"
  dependsOn:
    - name: infrastructure
    - name: helmresources
