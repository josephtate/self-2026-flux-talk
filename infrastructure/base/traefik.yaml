---
apiVersion: v1
kind: Namespace
metadata:
  name: ${NAMESPACE_PREFIX}-traefik
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: ${NAMESPACE_PREFIX}-traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: ">=32.0.0 <33.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    deployment:
      kind: DaemonSet
    service:
      type: ClusterIP
    ports:
      web:
        port: 80
        hostPort: 80
        redirectTo:
          port: websecure
      websecure:
        port: 443
        hostPort: 443
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: private
    # postBuild.substitute injects NAMESPACE_PREFIX, CLUSTER_NAME, DOMAIN
    # into this HelmRelease at reconcile time — no separate overlays needed
